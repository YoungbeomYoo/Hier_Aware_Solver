# Composable (simple): query_decomposer + rule_filter → single pass → solvability
# 가장 단순한 조합: LLM 호출 최소화, 빠른 baseline
dataset: hd_epic
pipeline: composable
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/HD-EPIC/stage2_v8_sync_30sec_no_window-hd-epic-tuned
  question_path: /lustre/youngbeom/DyHiStreamMem/datasets/HD-EPIC/hd-epic-annotations/vqa-benchmark
  video_root: /scratch2/youngbeom/datasets/HD-EPIC
  output_dir: ./output/hd_epic_composable_simple

components:
  query_decomposer:
    prompt: default
  solvability_checker:
    prompt: strict
  vlm_inference:
    image_token_size: 512
    memory_budget: 20000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_frames: 30
  leaf_budget: 15
  stages:
    decompose: query_decomposer
    filter: rule_filter
    context: flat
    search: single_pass
    check: solvability
    visual: on_uncertainty
    answer: solvability
