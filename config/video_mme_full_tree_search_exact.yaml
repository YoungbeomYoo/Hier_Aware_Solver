# Video-MME (Full) — Tree Search + Exact Key Matching + Visual Judge
# semantic pipeline 구조에서 embedding 제거, exact key_elements matching만 사용
# SLURM qid-level parallel로 실행
dataset: video_mme
pipeline: tree_search
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/Video-MME/stage2_30sec_no_window
  question_path: /lustre/youngbeom/DyHiStreamMem/vqa/video-mme/split_per_duration/long
  video_root: /scratch2/youngbeom/datasets/Video-MME/all
  output_dir: ./output/video_mme_full_exact

components:
  query_analyzer:
    prompt: detailed
  judge: {}
  judge_visual: {}
  tree_filter:
    match_threshold: 1
  context_assembler:
    max_text_budget: 100000
  history_compactor:
    max_observation_tokens: 20000
    max_state_tokens: 2000
  vlm_inference:
    image_token_size: 512
    memory_budget: 100000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_hops: 5
  max_frames: 30
  max_text_budget: 100000
