# Video-MME Subset — Tree Search Pipeline
# 10 videos, 30 questions (memory-only, no video frames needed for text path)
#
# Flow:
#   1. Query decompose → cues, time info
#   2. Filtered tree build (top-down key_elements matching)
#   3. Time shortcut if explicit time in question → direct jump
#   4. Hop loop: budget context → judge → navigate
#   5. Visual fallback if available
dataset: video_mme
pipeline: tree_search
cached: false

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/find_solver_please/subsets/Video-MME/memory
  question_path: /lustre/youngbeom/find_solver_please/subsets/Video-MME/questions
  video_root: /scratch2/youngbeom/datasets/Video-MME/all_videos
  output_dir: ./output/video_mme_subset_tree_search

components:
  query_analyzer:
    prompt: detailed
  judge: {}
  tree_filter:
    match_threshold: 1
  context_assembler:
    max_text_budget: 20000
  history_compactor:
    max_observation_tokens: 8000
    max_state_tokens: 800
  vlm_inference:
    image_token_size: 512
    memory_budget: 20000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_hops: 5
  max_frames: 30
  max_text_budget: 20000
