# ⑪ llm_select — A1+B3+C2+D0+E0+F0+G1
# tree_planner가 L1 summary로 LLM에게 유망 영역 선택 시킴.
# match_threshold=0: keyword matching 무효화 → LLM 선택만으로 탐색.
# B축 효과 확인: exact matching(B1) vs LLM selection(B3)
dataset: video_mme
pipeline: tree_search
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/Video-MME/stage2_v9
  question_path: /lustre/youngbeom/DyHiStreamMem/vqa/video-mme/split_per_duration/long
  video_root: /scratch2/youngbeom/datasets/Video-MME/all
  output_dir: ./output/ablation_llm_select

components:
  query_analyzer:
    prompt: detailed
  judge:
    prompt: videolucy
  # judge_visual 없음 → text-only mode
  tree_planner:
    max_regions: 10
    max_overview_tokens: 15000
  tree_filter:
    match_threshold: 0
  context_assembler:
    max_text_budget: 100000
  history:
    mode: accumulate
    max_total_tokens: 50000
    history_budget: 20000
  vlm_inference:
    image_token_size: 512
    memory_budget: 100000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_hops: 5
  max_frames: 30
  max_text_budget: 100000
