# ① baseline_exact — A1+B1+C0+D1+E0+F1+G0
# 기존 baseline. strict judge + 1-stage visual + history compact
dataset: video_mme
pipeline: tree_search
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/Video-MME/stage2_v9
  question_path: /lustre/youngbeom/DyHiStreamMem/vqa/video-mme/split_per_duration/long
  video_root: /scratch2/youngbeom/datasets/Video-MME/all
  output_dir: ./output/ablation_baseline_exact

components:
  query_analyzer:
    prompt: detailed
  judge: {}
  judge_visual: {}
  tree_filter:
    match_threshold: 1
  context_assembler:
    max_text_budget: 100000
  history_compactor:
    max_observation_tokens: 20000
    max_state_tokens: 2000
  vlm_inference:
    image_token_size: 512
    memory_budget: 100000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_hops: 5
  max_frames: 30
  max_text_budget: 100000
