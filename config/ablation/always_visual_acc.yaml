# ⑬ always_visual_acc — A1+B1+C2+D3+E0+F0+G1
# 매 hop 무조건 VLM captioning + accumulate history.
# D3+F0 vs D3+F1 비교용.
dataset: video_mme
pipeline: tree_search
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/Video-MME/stage2_30sec_no_window
  question_path: /lustre/youngbeom/DyHiStreamMem/vqa/video-mme/split_per_duration/long
  video_root: /scratch2/youngbeom/datasets/Video-MME/all
  output_dir: ./output/ablation_always_visual_acc

components:
  query_analyzer:
    prompt: detailed
  judge:
    prompt: videolucy
  judge_visual:
    force_visual: true
  tree_filter:
    match_threshold: 1
  context_assembler:
    max_text_budget: 100000
  history:
    mode: accumulate
    max_total_tokens: 50000
    history_budget: 20000
  vlm_inference:
    image_token_size: 512
    memory_budget: 100000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_hops: 5
  max_frames: 30
  max_text_budget: 100000
