# R8: G1 — Phase 0 coarse overview answer (C3+D0+F1 base)
# Level_2+Level_3 전체 summary로 1차 답변 시도 후 hop loop
dataset: video_mme
pipeline: tree_search
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/Video-MME/stage2_30sec_no_window
  question_path: /lustre/youngbeom/DyHiStreamMem/vqa/video-mme/split_per_duration/long
  video_root: /scratch2/youngbeom/datasets/Video-MME/all
  output_dir: ./output/ablation_coarse_first

components:
  query_analyzer:
    prompt: detailed
  judge:
    prompt: videolucy
    answer_judge: true
  tree_filter:
    match_threshold: 1
  context_assembler:
    max_text_budget: 100000
  history:
    mode: compact
  vlm_inference:
    image_token_size: 512
    memory_budget: 100000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_hops: 5
  max_frames: 30
  max_text_budget: 100000
  coarse_first: true
