# LVBench (Full) — Tree Search + Semantic Matching + Visual Judge
# 105 videos, Qwen3-Embedding-0.6B 시맨틱 매칭
# SLURM qid-level parallel로 실행
dataset: lvbench
pipeline: tree_search
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/LVBench/stage2_v9
  question_path: /lustre/youngbeom/DyHiStreamMem/datasets/LVBench/video_info.meta.jsonl
  video_root: /scratch2/youngbeom/datasets/LVBench/all_videos
  output_dir: ./output/lvbench_full_semantic

components:
  query_analyzer:
    prompt: detailed
  judge: {}
  judge_visual: {}
  tree_filter:
    match_threshold: 1
  context_assembler:
    max_text_budget: 100000
  history_compactor:
    max_observation_tokens: 20000
    max_state_tokens: 2000
  vlm_inference:
    image_token_size: 512
    memory_budget: 100000
  frame_loader:
    max_frames: 30
  semantic_matcher:
    model_path: /scratch2/youngbeom/ckpt/Qwen3-Embedding-0.6B
    top_k: 30
    batch_size: 64
    score_mode: sum

pipeline_params:
  max_hops: 5
  max_frames: 30
  max_text_budget: 100000
