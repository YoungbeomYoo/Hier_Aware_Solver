# TGVS Caption — Full 900Q Run
# Phase 1: Hierarchical coarse (best front-end) with query analyzer (A1)
# Phase 2: key_elements localization + leaf raw caption + VLM caption mode
# B-bias fixed: VLM prompt no longer hardcodes "B" as example answer
dataset: video_mme
pipeline: tree_visual
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/Video-MME/stage2_v9
  question_path: /lustre/youngbeom/DyHiStreamMem/vqa/video-mme/split_per_duration/long
  video_root: /scratch2/youngbeom/datasets/Video-MME/all
  output_dir: ./output/full_tgvs_caption

components:
  query_analyzer:
    prompt: detailed
  vlm_inference:
    image_token_size: 512
    memory_budget: 100000
  frame_loader:
    max_frames: 16
  tree_filter:
    match_threshold: 1

pipeline_params:
  coarse_mode: hierarchical
  localize_mode: key_elements
  vlm_mode: caption
  max_visual_iterations: 1
  max_frames: 16
  confidence_threshold: medium
