# Full Ablation: -C3вҶ’C2 вҶ’ C2+D0+F1+G1
# Bestм—җм„ң Answer Judgeл§Ң м ңкұ° (C3вҶ’C2, VideoLucy prompt мң м§Җ)
# Answer Judge(AJ)мқҳ лӢЁлҸ… кё°м—¬лҸ„ нҷ•мқё
dataset: video_mme
pipeline: tree_search
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/Video-MME/stage2_30sec_no_window
  question_path: /lustre/youngbeom/DyHiStreamMem/vqa/video-mme/split_per_duration/long
  video_root: /scratch2/youngbeom/datasets/Video-MME/all
  output_dir: ./output/full_ablation_minus_c3_to_c2

components:
  query_analyzer:
    prompt: detailed
  judge:
    prompt: videolucy
  tree_filter:
    match_threshold: 1
  context_assembler:
    max_text_budget: 100000
  history:
    mode: compact
  vlm_inference:
    image_token_size: 512
    memory_budget: 100000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_hops: 5
  max_frames: 30
  max_text_budget: 100000
  coarse_first: true
