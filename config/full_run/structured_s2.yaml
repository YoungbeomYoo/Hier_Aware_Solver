# Structured S2 ablation — structured STAGE 2 filter only
# A1 structured cues → build_structured(min_cat=2) in STAGE 2
# A2 recovery: 기존 recovery_cue (coarse context, 개별 시간)
# 나머지 A2 v3 baseline 동일
dataset: video_mme
pipeline: tree_search
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/Video-MME/stage2_v9
  question_path: /lustre/youngbeom/find_solver_please/subset_for_hop_optimize
  video_root: /scratch2/youngbeom/datasets/Video-MME/all
  output_dir: ./output/structured_s2

components:
  query_analyzer:
    prompt: detailed
  judge:
    prompt: videolucy
    answer_judge: true
  tree_filter:
    match_threshold: 1
  context_assembler:
    max_text_budget: 100000
  history:
    mode: compact
  vlm_inference:
    image_token_size: 512
    memory_budget: 100000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_hops: 5
  max_frames: 30
  max_text_budget: 100000
  coarse_first: true
  structured_s2: true
  sam_min_categories: 2
  recovery_cue: true
  recovery_cue_context: coarse
