# SAM Cycle — Structured Cue + Recovery 기반 Tree Search
# A1 (LLM structured cues) + SAM A2 (failure analysis → new cues) + B1 + C3 + D0 + F1 + G1
dataset: video_mme
pipeline: tree_search
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/Video-MME/stage2_v9
  question_path: /lustre/youngbeom/find_solver_please/subset_for_hop_optimize
  video_root: /scratch2/youngbeom/datasets/Video-MME/all
  output_dir: ./output/sam_cycle

components:
  query_analyzer:
    prompt: detailed
  judge:
    prompt: videolucy
    answer_judge: true
  tree_filter:
    match_threshold: 1
  context_assembler:
    max_text_budget: 100000
  history:
    mode: compact
  vlm_inference:
    image_token_size: 512
    memory_budget: 100000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_hops: 5
  max_frames: 30
  max_text_budget: 100000
  coarse_first: true
  sam_cycle: true
  sam_min_categories: 2
