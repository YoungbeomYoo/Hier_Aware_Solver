# Composable (cognitive-spread): query_analyzer + metadata_filter + spreading_activation → elimination
# Cognitive pipeline과 비슷하지만 multi_hop 없고 spreading_activation 사용
dataset: hd_epic
pipeline: composable
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/HD-EPIC/stage2_v8_sync_30sec_no_window-hd-epic-tuned
  question_path: /lustre/youngbeom/DyHiStreamMem/datasets/HD-EPIC/hd-epic-annotations/vqa-benchmark
  video_root: /scratch2/youngbeom/datasets/HD-EPIC
  output_dir: ./output/hd_epic_composable_cognitive_spread

components:
  query_analyzer:
    prompt: detailed
  uncertainty_checker:
    prompt: default
  elimination_reasoner:
    prompt: default
  vlm_inference:
    image_token_size: 512
    memory_budget: 20000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_frames: 30
  leaf_budget: 15
  stages:
    decompose: query_analyzer
    filter: metadata_filter
    context: spreading_activation
    search: single_pass
    check: uncertainty
    visual: on_uncertainty
    answer: elimination
