dataset: video_mme
pipeline: agentic
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/Video-MME/stage2_v9
  question_path: /lustre/youngbeom/DyHiStreamMem/vqa/video-mme/split_per_duration/long
  video_root: /scratch2/youngbeom/datasets/Video-MME
  output_dir: ./output/video_mme_agentic

components:
  query_decomposer:
    prompt: default
  solvability_checker:
    prompt: strict
  leaf_selector:
    prompt: budget
  vlm_inference:
    image_token_size: 512
    memory_budget: 20000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_hops: 5
  leaf_budget: 10
  depth_budget: 5
  max_frames: 30
