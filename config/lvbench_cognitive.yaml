dataset: lvbench
pipeline: cognitive
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/LVBench/stage2_30sec_no_window
  question_path: /lustre/youngbeom/DyHiStreamMem/datasets/LVBench/video_info.meta.jsonl
  video_root: /scratch2/youngbeom/datasets/LVBench/all_videos
  output_dir: ./output/lvbench_cognitive

components:
  query_analyzer:
    prompt: detailed
  uncertainty_checker:
    prompt: default
  elimination_reasoner:
    prompt: default
  leaf_selector:
    prompt: budget
  vlm_inference:
    image_token_size: 512
    memory_budget: 20000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_frames: 30
  max_visual_retries: 1
  include_siblings: false
  leaf_budget: 15
