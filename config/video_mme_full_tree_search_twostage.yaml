# Video-MME (Full) — Tree Search + Two-Stage Visual + History Accumulation + VideoLucy Prompt
# Scout(넓게 3장씩) → LLM Focus Select(유망 구간 + VLM instruction) → Focus(깊게) → Rejudge
# History: 삭제 없이 전부 누적 (VideoLucy 스타일)
dataset: video_mme
pipeline: tree_search
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/Video-MME/stage2_30sec_no_window
  question_path: /lustre/youngbeom/DyHiStreamMem/vqa/video-mme/split_per_duration/long
  video_root: /scratch2/youngbeom/datasets/Video-MME/all
  output_dir: ./output/video_mme_full_twostage

components:
  query_analyzer:
    prompt: detailed
  judge:
    prompt: videolucy
  judge_visual:
    two_stage: true
    scout_frames_per_region: 3
    focus_max_frames: 30
  tree_filter:
    match_threshold: 1
  context_assembler:
    max_text_budget: 100000
  history:
    mode: accumulate
    max_total_tokens: 50000
    history_budget: 20000
  vlm_inference:
    image_token_size: 512
    memory_budget: 100000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_hops: 5
  max_frames: 30
  max_text_budget: 100000
