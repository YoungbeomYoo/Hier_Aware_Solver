# Composable: hierarchical_scorer + multi_hop + elimination
dataset: video_mme
pipeline: composable
cached: true

model:
  path: /scratch2/youngbeom/ckpt/Qwen3-VL-8B-Instruct
  type: qwen3vl
  dtype: bfloat16
  attn_impl: flash_attention_2

paths:
  memory_dir: /lustre/youngbeom/DyHiStreamMem/poc/results/Video-MME/stage2_v9
  question_path: /lustre/youngbeom/DyHiStreamMem/vqa/video-mme/split_per_duration/long
  video_root: /scratch2/youngbeom/datasets/Video-MME
  output_dir: ./output/video_mme_composable_multihop

components:
  query_analyzer:
    prompt: detailed
  uncertainty_checker:
    prompt: default
  elimination_reasoner:
    prompt: default
  hierarchical_scorer:
    match_threshold: 1
  vlm_inference:
    image_token_size: 512
    memory_budget: 20000
  frame_loader:
    max_frames: 30

pipeline_params:
  max_hops: 5
  max_frames: 30
  leaf_budget: 15
  stages:
    decompose: query_analyzer
    filter: hierarchical_scorer
    context: scored_hierarchy
    search: multi_hop
    check: uncertainty
    visual: on_uncertainty
    answer: elimination
